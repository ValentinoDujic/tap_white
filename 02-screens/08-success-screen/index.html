<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Taplito - Narudžba potvrđena!</title>
    <!-- Global Design System -->
    <link rel="stylesheet" href="../../global.css">
    <!-- Component Specific Styles -->
    <link rel="stylesheet" href="style.css">
    <script src="../../translations.js"></script>
</head>
<body>

    <!-- Ambient Background Blobs -->
    <div class="ambient-bg">
        <div class="ambient-blob ambient-blob-1"></div>
        <div class="ambient-blob ambient-blob-2"></div>
    </div>
    <div class="cyber-grid"></div>

    <main class="success-container page-transition">
        <div class="checkmark-wrapper">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline class="checkmark-path" points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>

        <h1 data-i18n="success_title">Narudžba primljena!</h1>
        <p data-i18n="success_desc">Tvoja narudžba je zaprimljena i uskoro će biti u pripremi. Možeš pratiti status u realnom vremenu.</p>

        <div class="order-id-chip" data-i18n="success_order_id">Narudžba #12345</div>
        <p class="email-info" data-i18n="success_email_info">📧 Potvrda je poslana na vasa@email.hr</p>

        <div class="actions">
            <a href="../07-order-detail-screen/index.html" class="btn-primary track-btn">
                <span data-i18n="track_order">Prati narudžbu</span>
                <span>→</span>
            </a>
            <a href="../02-main-screen/index.html" class="back-to-menu" data-i18n="back_to_menu_extra">← Naruči nešto još</a>
        </div>
    </main>

</body>
</html>
