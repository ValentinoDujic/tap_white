    <script>
        document.getElementById('noteToggle').addEventListener('click', function() {
            this.classList.toggle('active');
            document.getElementById('noteContainer').classList.toggle('active');
            
            const isActive = this.classList.contains('active');
            const icon = isActive ? '−' : '+';
            const textKey = isActive ? 'note_hide' : 'note_add';
            this.innerHTML = `<span>${icon}</span> <span data-i18n="${textKey}">${getTranslation(textKey)}</span>`;
        });

        // Dynamic Cart Logic
        function getThumbImage(id) {
            if (id.includes('burger')) return '../03-product-screen/assets/burger_v2.png';
            if (id.includes('cola')) return '../02-main-screen/assets/coca_cola.png';
            if (id.includes('orange')) return '../02-main-screen/assets/orange_juice.png';
            return '../03-product-screen/assets/hero.png'; // default espresso/cappuccino
        }

        function renderCart() {
            const items = Cart.getItems();
            const listEl = document.getElementById('cartListContainer');
            listEl.innerHTML = '';
            
            if(items.length === 0) {
                listEl.innerHTML = `<div style="text-align:center; padding:40px 20px; color:var(--text-muted);">Vaša košarica je prazna.</div>`;
            }
            
            items.forEach((item, index) => {
                const itemTotal = item.price + (item.modifiers || []).reduce((sum, mod) => sum + (mod.price || 0), 0);
                
                const modsHtml = item.modifiers && item.modifiers.length > 0 
                    ? `<div class="item-modifiers">${item.modifiers.map(m => getTranslation(m.key)).join(', ')}</div>`
                    : '';
                
                const imgPath = getThumbImage(item.id);
                
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <div class="item-thumb"><img src="${imgPath}" alt=""></div>
                    <div class="item-details">
                        <div class="item-header">
                            <h3 data-i18n="${item.nameKey}">${getTranslation(item.nameKey)}</h3>
                            <button class="remove-btn" data-index="${index}">✕</button>
                        </div>
                        ${modsHtml}
                        <div class="item-footer">
                            <span class="item-price">${(itemTotal * item.qty).toFixed(2)}€</span>
                            <div class="qty-control">
                                <button class="qty-btn minus" data-index="${index}">—</button>
                                <span class="qty-val">${item.qty}</span>
                                <button class="qty-btn plus" data-index="${index}">+</button>
                            </div>
                        </div>
                    </div>
                `;
                listEl.appendChild(div);
            });
            
            const totals = Cart.getTotals();
            document.getElementById('cartTotalVal').textContent = totals.subtotal.toFixed(2) + '€';
            document.getElementById('checkoutTotalVal').textContent = '· ' + totals.subtotal.toFixed(2) + '€';
            
            bindCartEvents();
        }

        function bindCartEvents() {
            document.querySelectorAll('.remove-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    Cart.removeItem(e.target.getAttribute('data-index'));
                    renderCart();
                });
            });
            document.querySelectorAll('.qty-btn.minus').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = e.target.getAttribute('data-index');
                    const items = Cart.getItems();
                    Cart.updateQty(idx, items[idx].qty - 1);
                    renderCart();
                });
            });
            document.querySelectorAll('.qty-btn.plus').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = e.target.getAttribute('data-index');
                    const items = Cart.getItems();
                    Cart.updateQty(idx, items[idx].qty + 1);
                    renderCart();
                });
            });
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            renderCart();
            
            // Upsell add
            document.querySelectorAll('.upsell-add-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const t = e.target;
                    Cart.addItem({
                        id: t.getAttribute('data-id'),
                        nameKey: t.getAttribute('data-id'),
                        price: parseFloat(t.getAttribute('data-price')),
                        qty: 1,
                        modifiers: []
                    });
                    
                    t.style.background = 'var(--status-success)';
                    t.innerHTML = '✓';
                    setTimeout(() => {
                        t.style.background = '';
                        t.innerHTML = '+';
                    }, 800);
                    
                    renderCart();
                });
            });
        });
