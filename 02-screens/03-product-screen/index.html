        <!-- Product Content -->
        <div class="product-content">

            <section>

            <!-- Modifiers -->
            <section class="modifier-group">

                <div class="radio-item" data-mod-price="0" data-mod-key="milk_lactose">

            <!-- Upsell -->
            <section class="upsell-section">

                    <div class="upsell-card">

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Radio items toggle
            const items = document.querySelectorAll('.radio-item');
            items.forEach(item => {
                item.addEventListener('click', () => {
                    items.forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    updateQty();
                });
            });

            // Qty control
            let qty = 1;
            const basePrice = 2.20;
            const qtyLabel = document.getElementById('qty');
            const btnPrice = document.getElementById('btn-price');

            document.getElementById('plus').addEventListener('click', () => {
                qty++;
                updateQty();
            });

            document.getElementById('minus').addEventListener('click', () => {
                if(qty > 1) {
                    qty--;
                    updateQty();
                }
            });

            function updateQty() {
                const activeMod = document.querySelector('.radio-item.active');
                const modPrice = parseFloat(activeMod.getAttribute('data-mod-price'));
                const totalUnit = basePrice + modPrice;
                
                qtyLabel.textContent = qty;
                btnPrice.textContent = (qty * totalUnit).toFixed(2) + '€';
            }
            
            document.querySelector('.add-to-order-btn').addEventListener('click', () => {
                const activeMod = document.querySelector('.radio-item.active');
                const modKey = activeMod.getAttribute('data-mod-key');
                const mods = modKey === 'milk_whole' ? [] : [{
                    key: modKey,
                    price: parseFloat(activeMod.getAttribute('data-mod-price'))
                }];
                
                Cart.addItem({
                    id: 'item_cappuccino',
                    nameKey: 'item_cappuccino',
                    price: basePrice,
                    qty: qty,
                    modifiers: mods
                });
                
                window.location.href = '../04-summary-screen/index.html';
            });

            // 3D Tilt effect on product image
            const hero = document.querySelector('.product-hero');
            const img = document.querySelector('.product-hero img');
            if (hero && img) {
                img.style.transition = 'transform 0.1s ease-out';
                
                hero.addEventListener('mousemove', (e) => {
                    const rect = hero.getBoundingClientRect();
                    const x = e.clientX - rect.left - rect.width / 2;
                    const y = e.clientY - rect.top - rect.height / 2;
                    
                    const rotX = -(y / (rect.height / 2)) * 12;
                    const rotY = (x / (rect.width / 2)) * 12;
                    
                    img.style.transform = `perspective(1000px) rotateX(${rotX}deg) rotateY(${rotY}deg) scale(1.06)`;
                });
                
                hero.addEventListener('mouseleave', () => {
                    img.style.transition = 'transform 0.5s ease';
                    img.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)';
                });
            }

            // Waiter Bottom Sheet Logic (HIDDEN)
