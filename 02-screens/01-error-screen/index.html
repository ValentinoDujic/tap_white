<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Taplito - Ups! Greška</title>
    <!-- Global Design System -->
    <link rel="stylesheet" href="../../global.css">
    <!-- Component Specific Styles -->
    <link rel="stylesheet" href="style.css">
    <script src="../../translations.js"></script>
</head>
<body>

    <!-- Ambient Background Blobs -->
    <div class="ambient-bg">
        <div class="ambient-blob ambient-blob-1"></div>
        <div class="ambient-blob ambient-blob-2"></div>
    </div>
    <div class="cyber-grid"></div>

    <main class="error-container">
        <div class="error-logo">Taplito</div>

        <img src="assets/error_img.png" alt="Greška" class="error-img">

        <h1 data-i18n="error_title">Ups! Lokal nije dostupan</h1>
        <p data-i18n="error_desc">Trenutno ne možemo učitati podatke za ovaj lokal. Provjeri svoju internetsku vezu ili pokušaj ponovno za nekoliko trenutaka.</p>

        <div class="error-actions">
            <a href="../02-main-screen/index.html" class="btn-primary retry-btn" id="retryBtn">
                <span data-i18n="retry_btn">Pokušaj ponovno</span>
                <span>↻</span>
            </a>
            <a href="#" class="support-link" data-i18n="support_link">Kontaktiraj podršku</a>
        </div>
    </main>

    <script>
        document.getElementById('retryBtn').addEventListener('click', (e) => {
            e.preventDefault();
            const btn = e.currentTarget;
            btn.classList.add('loading');
            // Simulate retry then navigate
            setTimeout(() => {
                window.location.href = '../02-main-screen/index.html';
            }, 1500);
        });
    </script>

</body>
</html>
